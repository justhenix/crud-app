stages:
  - test
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - ~/.composer/cache/

# === Test Stage ===
test:
  stage: test
  image: php:8.4-alpine
  before_script:
    - apk add --no-cache sqlite-dev libxml2-dev libpng-dev libzip-dev zip unzip git oniguruma-dev
    - docker-php-ext-install pdo pdo_sqlite xml gd zip bcmath mbstring
    - php -r "copy('https://getcomposer.org/composer.phar', '/usr/bin/composer');"
    - chmod +x /usr/bin/composer
  script:
    - composer install --no-progress --no-interaction --prefer-dist
    - cp .env.example .env
    - php artisan key:generate
    - php artisan test

# === Deploy Stage ===
deploy:
  stage: deploy
  image: alpine:latest
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if echo "$SSH_PRIVATE_KEY" | grep -q "BEGIN"; then
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      else
        cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
      fi
    - echo "" >> ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-add ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    # 1. Sync project files to VM
    - rsync -avz --delete
        --exclude='.git/'
        --exclude='.gitlab-ci.yml'
        --exclude='.env'
        --exclude='.env.production'
        --exclude='node_modules/'
        --exclude='vendor/'
        --exclude='storage/logs/*'
        --exclude='storage/framework/cache/*'
        --exclude='storage/framework/sessions/*'
        --exclude='storage/framework/views/*'
        --exclude='azure/'
        ./ $SSH_USER@$VPS_IP:/var/www/pc-lab-inventory/

    # 2. Run deploy script on VM
    - |
      ssh $SSH_USER@$VPS_IP "
        cd /var/www/pc-lab-inventory && \
        docker compose -f docker-compose.prod.yml up -d --build --remove-orphans && \
        sleep 5 && \
        docker compose -f docker-compose.prod.yml exec -T app sh -c '
          chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache && \
          chmod -R 775 /var/www/storage /var/www/bootstrap/cache
        ' && \
        docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force && \
        docker compose -f docker-compose.prod.yml exec -T app php artisan config:cache && \
        docker compose -f docker-compose.prod.yml exec -T app php artisan route:cache && \
        docker compose -f docker-compose.prod.yml exec -T app php artisan view:cache && \
        docker compose -f docker-compose.prod.yml exec -T app php artisan event:cache
      "
  environment:
    name: production
    url: https://crud.henix.my.id
