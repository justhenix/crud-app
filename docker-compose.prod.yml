###############################################################################
# Production Docker Compose — PC Lab Inventory System
# Target: crud.henix.my.id on single Azure VM
# Usage:  docker compose -f docker-compose.prod.yml up -d --build
###############################################################################

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pclab-db
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pclab}
      POSTGRES_USER: ${DB_USERNAME:-pclab_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # ── PHP-FPM Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pclab-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      - app_public:/var/www/public
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Nginx Web Server ─────────────────────────────────────────────────────
  web:
    image: nginx:alpine
    container_name: pclab-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/public:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Certbot (SSL) ────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: pclab-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run once then exit; renew via cron on host
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew --quiet; done;'"

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  app_public:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local
