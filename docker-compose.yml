services:
  # === 1. Database Service (PostgreSQL) ===
  db:
    image: postgres:16-alpine
    container_name: pc-lab-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-laravel_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === 2. Application Service (PHP-FPM) ===
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pc-lab-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel_user}
      DB_PASSWORD: ${DB_PASSWORD:-laravel_password}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      - public_html:/var/www/public
    networks:
      - laravel_network

  # === 3. Web Server Service (Nginx) ===
  web:
    image: nginx:alpine
    container_name: pc-lab-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public_html:/var/www/public:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - laravel_network

  # === 4. Certbot Service ===
  certbot:
    image: certbot/certbot:latest
    container_name: pc-lab-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    networks:
      - laravel_network
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew --quiet; done;'"

# === Networks and Volumes Configuration ===  
networks:
  laravel_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  public_html:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local

